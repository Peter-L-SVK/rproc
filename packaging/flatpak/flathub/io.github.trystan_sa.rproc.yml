app-id: io.github.trystan_sa.rproc
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: rproc

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Read-only host access: rproc reads /proc, /sys and mount points to report
  # system-wide resource and process usage.
  - --filesystem=host:ro
  # Services / Startup tabs query and toggle systemd units over D-Bus.
  - --talk-name=org.freedesktop.systemd1
  - --system-talk-name=org.freedesktop.systemd1

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/rproc/cargo

modules:
  - name: rproc
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/rproc /app/bin/rproc
      - install -Dm644 packaging/io.github.trystan_sa.rproc.desktop
          /app/share/applications/io.github.trystan_sa.rproc.desktop
      - install -Dm644 packaging/io.github.trystan_sa.rproc.metainfo.xml
          /app/share/metainfo/io.github.trystan_sa.rproc.metainfo.xml
      - install -Dm644 packaging/icons/hicolor/scalable/apps/io.github.trystan_sa.rproc.svg
          /app/share/icons/hicolor/scalable/apps/io.github.trystan_sa.rproc.svg
    sources:
      - type: git
        url: https://github.com/Trystan-SA/rproc.git
        tag: v0.3.6
        # TODO: fill in with the v0.3.6 tag's commit after release
        # (git rev-list -n1 v0.3.6). Flathub requires both tag and commit.
        commit: 0000000000000000000000000000000000000000
      - cargo-sources.json
