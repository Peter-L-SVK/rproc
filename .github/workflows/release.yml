name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binary:
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential pkg-config \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libxcb1-dev libfontconfig1-dev \
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build
        run: cargo build --release --locked

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/rproc dist/
          cd dist
          tar czf rproc-${GITHUB_REF_NAME}-linux-x86_64.tar.gz rproc
          sha256sum rproc-${GITHUB_REF_NAME}-linux-x86_64.tar.gz > rproc-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rproc-binary
          path: target/release/rproc
          retention-days: 1

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: rproc-tarball
          path: dist/*

  build-deb:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Download prebuilt binary
        uses: actions/download-artifact@v4
        with:
          name: rproc-binary
          path: target/release

      - name: Restore binary permissions
        run: chmod +x target/release/rproc

      - name: Build .deb
        run: cargo deb --no-build --no-strip --output dist/

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: rproc-deb
          path: dist/*.deb

  build-rpm:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Download prebuilt binary
        uses: actions/download-artifact@v4
        with:
          name: rproc-binary
          path: target/release

      - name: Restore binary permissions and strip
        run: |
          chmod +x target/release/rproc
          strip target/release/rproc || true

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rproc-rpm
          path: target/generate-rpm/*.rpm

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate cargo-sources.json
        run: |
          curl -L -o /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 -m pip install --break-system-packages aiohttp toml
          python3 /tmp/flatpak-cargo-generator.py Cargo.lock \
            -o packaging/flatpak/cargo-sources.json

      - name: Build Flatpak bundle
        uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: rproc-${{ github.ref_name }}-x86_64.flatpak
          manifest-path: packaging/flatpak/io.github.trystan_sa.rproc.yml
          cache-key: flatpak-builder-${{ github.sha }}

  release:
    needs: [build-binary, build-deb, build-rpm, build-flatpak]
    # Publish whatever built. The binary is required; the .deb / .rpm /
    # .flatpak jobs are best-effort, so a single failure (e.g. flatpak)
    # never blocks the release of the others.
    if: ${{ always() && needs.build-binary.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: rproc-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Generate notes against the previous semver tag explicitly. GitHub's
      # auto-detection picks the nearest ancestor tag, which double-counts a
      # release whose predecessor was tagged off a side branch (not an
      # ancestor). Computing the previous tag by version keeps the changelog
      # to the true delta.
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          prev=$(git tag --list 'v*' --sort=-v:refname \
            | awk -v cur="$tag" 'found{print; exit} $0==cur{found=1}')
          echo "current=$tag previous=${prev:-<none>}"
          args=(-f tag_name="$tag")
          [ -n "$prev" ] && args+=(-f previous_tag_name="$prev")
          gh api -X POST "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            "${args[@]}" --jq .body > notes.md
          cat notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false
          body_path: notes.md

  # Push an updated PKGBUILD to the AUR. Requires the following repo
  # secrets (Settings -> Secrets and variables -> Actions):
  #   AUR_USERNAME, AUR_EMAIL, AUR_SSH_PRIVATE_KEY (matching pubkey
  #   uploaded to https://aur.archlinux.org/account/<user>).
  # The AUR package "rproc-bin" must already exist.
  publish-aur:
    needs: release
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    environment: AutoDeploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: rproc-tarball
          path: dist

      - name: Refresh PKGBUILD
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          pkgbuild=packaging/aur/PKGBUILD
          declare -A sums=(
            [bin]=$(sha256sum "dist/rproc-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" | awk '{print $1}')
            [desktop]=$(sha256sum packaging/io.github.trystan_sa.rproc.desktop | awk '{print $1}')
            [metainfo]=$(sha256sum packaging/io.github.trystan_sa.rproc.metainfo.xml | awk '{print $1}')
            [svg]=$(sha256sum packaging/icons/hicolor/scalable/apps/io.github.trystan_sa.rproc.svg | awk '{print $1}')
            [service]=$(sha256sum packaging/rprocd.system.service | awk '{print $1}')
            [license]=$(sha256sum LICENSE | awk '{print $1}')
          )
          sed -i \
            -e "s/^pkgver=.*/pkgver=${version}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            "$pkgbuild"
          for tag in "${!sums[@]}"; do
            sed -i -E "s|'[0-9a-f]{64}' # ${tag}\$|'${sums[$tag]}' # ${tag}|" "$pkgbuild"
          done
          cat "$pkgbuild"

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: rproc-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
