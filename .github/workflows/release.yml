name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binary:
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential pkg-config \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libxcb1-dev libfontconfig1-dev \
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build
        run: cargo build --release --locked

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/rproc dist/
          cd dist
          tar czf rproc-${GITHUB_REF_NAME}-linux-x86_64.tar.gz rproc
          sha256sum rproc-${GITHUB_REF_NAME}-linux-x86_64.tar.gz > rproc-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rproc-binary
          path: target/release/rproc
          retention-days: 1

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: rproc-tarball
          path: dist/*

  build-deb:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Download prebuilt binary
        uses: actions/download-artifact@v4
        with:
          name: rproc-binary
          path: target/release

      - name: Restore binary permissions
        run: chmod +x target/release/rproc

      - name: Build .deb
        run: cargo deb --no-build --no-strip --output dist/

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: rproc-deb
          path: dist/*.deb

  build-rpm:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Download prebuilt binary
        uses: actions/download-artifact@v4
        with:
          name: rproc-binary
          path: target/release

      - name: Restore binary permissions and strip
        run: |
          chmod +x target/release/rproc
          strip target/release/rproc || true

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rproc-rpm
          path: target/generate-rpm/*.rpm

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate cargo-sources.json
        run: |
          curl -L -o /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 -m pip install --break-system-packages aiohttp toml
          python3 /tmp/flatpak-cargo-generator.py Cargo.lock \
            -o packaging/flatpak/cargo-sources.json

      - name: Build Flatpak bundle
        uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: rproc-${{ github.ref_name }}-x86_64.flatpak
          manifest-path: packaging/flatpak/io.github.trystan_sa.rproc.yml
          cache-key: flatpak-builder-${{ github.sha }}

  release:
    needs: [build-binary, build-deb, build-rpm, build-flatpak]
    # Publish whatever built. The binary is required; the .deb / .rpm /
    # .flatpak jobs are best-effort, so a single failure (e.g. flatpak)
    # never blocks the release of the others.
    if: ${{ always() && needs.build-binary.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: rproc-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false
          generate_release_notes: true
